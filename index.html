<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmystere5 - Linktree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #04080f;
            --blue:    #1a4fff;
            --cyan:    #00c8ff;
            --ice:     #a8d8ff;
            --surface: rgba(0, 100, 200, 0.06);
            --border:  rgba(0, 150, 255, 0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: #dff0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* ── Background ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.2;
            animation: drift 20s ease-in-out infinite;
        }
        .orb-1 { width: 700px; height: 700px; background: #0033bb; top: -260px; left: -200px; animation-delay: 0s; }
        .orb-2 { width: 450px; height: 450px; background: #0088dd; bottom: -160px; right: -100px; animation-delay: -8s; }
        .orb-3 { width: 280px; height: 280px; background: #00ccff; top: 40%; left: 55%; animation-delay: -14s; opacity: 0.1; }

        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(35px,-25px) scale(1.04); }
            66%      { transform: translate(-20px,45px) scale(0.96); }
        }

        /* Scanline overlay */
        .bg-canvas::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,80,180,0.015) 2px,
                rgba(0,80,180,0.015) 4px
            );
            pointer-events: none;
        }

        /* ── Container ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.2rem;
        }

        /* ── Live banner ── */
        .live-banner {
            display: none;
            width: 100%;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.65rem 1.2rem;
            border-radius: 12px;
            background: rgba(233,25,22,0.1);
            border: 1px solid rgba(233,25,22,0.28);
            text-decoration: none;
            color: #ff9999;
            font-size: 0.84rem;
            font-weight: 500;
            animation: fadeUp 0.6s ease both;
            transition: background 0.2s, border-color 0.2s;
        }
        .live-banner:hover { background: rgba(233,25,22,0.18); border-color: rgba(233,25,22,0.5); }
        .live-banner.visible { display: flex; }

        .live-banner-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #e91916;
            animation: blink 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }

        /* ── Profile ── */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        .avatar-wrap {
            position: relative;
            width: 108px;
            height: 108px;
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #0044ff, #00aaff, #00e5ff, #007fff, #0044ff);
            animation: spin 5s linear infinite;
            z-index: 0;
        }

        .avatar-bg {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: var(--bg);
            z-index: 1;
        }

        .avatar {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Live badge on avatar — hidden by default */
        .live-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            z-index: 3;
            background: #e91916;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 2px 7px;
            border-radius: 5px;
            border: 2px solid var(--bg);
            display: none;
            align-items: center;
            gap: 4px;
        }
        .live-badge.visible { display: flex; }

        .live-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #fff;
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.35; transform: scale(0.65); }
        }

        .profile-name {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 8vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
            background: linear-gradient(120deg, #fff 0%, var(--ice) 35%, var(--cyan) 65%, #0088ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s linear infinite;
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        .profile-bio {
            font-size: 0.87rem;
            color: rgba(160,205,255,0.42);
            text-align: center;
            max-width: 270px;
            line-height: 1.55;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,170,255,0.18), transparent);
        }

        /* ── Links ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            color: #dff0ff;
            border: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                        border-color 0.25s ease,
                        box-shadow 0.25s ease;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .link-btn:hover { transform: translateY(-4px) scale(1.01); }
        .link-btn:active { transform: translateY(-1px) scale(0.99); }

        .btn-twitch    { animation-delay: 0.15s; }
        .btn-discord   { animation-delay: 0.22s; }
        .btn-tiktok    { animation-delay: 0.29s; }
        .btn-instagram { animation-delay: 0.36s; }
        .btn-support   { animation-delay: 0.43s; }

        .btn-twitch::before    { background: linear-gradient(135deg,rgba(0,80,255,0.2),rgba(0,200,255,0.06)); }
        .btn-discord::before   { background: linear-gradient(135deg,rgba(30,60,220,0.22),rgba(0,140,255,0.07)); }
        .btn-tiktok::before    { background: linear-gradient(135deg,rgba(0,50,140,0.22),rgba(0,210,255,0.08)); }
        .btn-instagram::before { background: linear-gradient(135deg,rgba(0,50,170,0.22),rgba(0,180,255,0.08)); }
        .btn-support::before   { background: linear-gradient(135deg,rgba(0,90,200,0.22),rgba(150,220,255,0.06)); }

        .btn-twitch:hover    { border-color: var(--cyan);   box-shadow: 0 0 28px rgba(0,200,255,0.28), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-discord:hover   { border-color: #5fa8ff;       box-shadow: 0 0 28px rgba(70,130,255,0.28), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-tiktok:hover    { border-color: #00d4ff;       box-shadow: 0 0 28px rgba(0,200,255,0.22), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-instagram:hover { border-color: #88ccff;       box-shadow: 0 0 28px rgba(100,180,255,0.22), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-support:hover   { border-color: var(--ice);    box-shadow: 0 0 28px rgba(168,216,255,0.22), 0 8px 30px rgba(0,0,0,0.5); }

        .link-btn:hover::before { opacity: 1; }

        .btn-icon {
            width: 20px; height: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            opacity: 0.65;
        }

        .btn-label {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .btn-arrow {
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity 0.2s, transform 0.2s;
            color: rgba(140,200,255,0.55);
        }
        .link-btn:hover .btn-arrow { opacity: 1; transform: translateX(0); }

        /* ── Footer ── */
        .footer {
            font-size: 0.72rem;
            color: rgba(100,160,220,0.28);
            letter-spacing: 0.05em;
            animation: fadeUp 0.8s ease 0.52s both;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <script>
        // ── Twitch Live Detection via decapi.me (no auth required) ──
        const CHANNEL = 'emmystere5';

        async function checkLive() {
            try {
                const res = await fetch(`https://decapi.me/twitch/uptime/${CHANNEL}`);
                const text = await res.text();
                // decapi returns a duration string if live, or contains "offline" if not
                const isLive = !text.toLowerCase().includes('offline') && text.trim().length > 0;
                document.getElementById('liveBadge').classList.toggle('visible', isLive);
                document.getElementById('liveBanner').classList.toggle('visible', isLive);
            } catch (_) { /* silent fail */ }
        }

        checkLive();
        setInterval(checkLive, 120_000); // re-check every 2 minutes
    </script>
