    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060f;
            --cyan: #00d4ff;
            --glow: rgba(0,200,255,0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #c8e4ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            overflow-x: hidden;
        }

        /* ── Canvas ── */
        #starCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Live pill ── */
        .live-pill {
            display: none;
            align-items: center;
            gap: 7px;
            padding: 5px 14px 5px 10px;
            border-radius: 99px;
            border: 1px solid rgba(233,25,22,0.35);
            background: rgba(233,25,22,0.08);
            text-decoration: none;
            color: #ff8080;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 2.4rem;
            transition: background 0.2s;
            animation: fadeUp 0.5s ease both;
        }
        .live-pill:hover { background: rgba(233,25,22,0.16); }
        .live-pill.visible { display: flex; }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #e91916;
            animation: blink 1.2s ease-in-out infinite;
        }

        .live-badge { display: none; }

        /* ── Name ── */
        .name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.4rem, 14vw, 5.2rem);
            letter-spacing: 0.06em;
            line-height: 1;
            color: #fff;
            text-align: center;
            background: linear-gradient(160deg, #fff 0%, #a8d8ff 40%, var(--cyan) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(0,200,255,0.35));
            margin-bottom: 0.5rem;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.05s both;
        }

        .bio {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(120,170,220,0.5);
            text-align: center;
            letter-spacing: 0.04em;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s ease 0.1s both;
        }

        /* ── Links ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        .link-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 0;
            text-decoration: none;
            color: rgba(180,220,255,0.65);
            font-size: 0.88rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0,150,255,0.08);
            transition: color 0.25s ease, padding-left 0.25s cubic-bezier(0.34,1.56,0.64,1);
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        .link-item:first-child { border-top: 1px solid rgba(0,150,255,0.08); }

        .link-item:hover {
            color: #fff;
            padding-left: 8px;
        }

        /* Subtle horizontal glow sweep on hover */
        .link-item::after {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0%;
            background: var(--cyan);
            border-radius: 2px;
            transition: height 0.25s ease;
            box-shadow: 0 0 12px var(--cyan);
        }
        .link-item:hover::after { height: 60%; }

        .link-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .link-icon {
            width: 17px;
            height: 17px;
            opacity: 0.4;
            flex-shrink: 0;
            transition: opacity 0.2s;
            fill: currentColor;
        }
        .link-item:hover .link-icon { opacity: 0.9; }

        .link-num {
            font-size: 0.62rem;
            color: rgba(0,200,255,0.25);
            letter-spacing: 0.08em;
            font-weight: 400;
            transition: color 0.2s;
        }
        .link-item:hover .link-num { color: rgba(0,200,255,0.6); }

        .link-arrow {
            font-size: 0.65rem;
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity 0.2s, transform 0.2s;
            color: rgba(0,200,255,0.5);
        }
        .link-item:hover .link-arrow { opacity: 1; transform: translateX(0); }

        /* delays */
        .link-item:nth-child(1) { animation-delay: 0.18s; }
        .link-item:nth-child(2) { animation-delay: 0.24s; }
        .link-item:nth-child(3) { animation-delay: 0.30s; }
        .link-item:nth-child(4) { animation-delay: 0.36s; }
        .link-item:nth-child(5) { animation-delay: 0.42s; }

        /* ── Footer ── */
        .footer {
            margin-top: 3.5rem;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: rgba(60,100,160,0.3);
            text-transform: uppercase;
            animation: fadeUp 0.8s ease 0.55s both;
        }
        .footer span { color: rgba(0,200,255,0.3); }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink {
            0%,100% { opacity:1; }
            50%      { opacity:0.2; }
        }
    </style>

<script>
// ── Starfield ──
(function () {
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [], shoots = [];
    let frame = 0;

    const COLORS = [
        'rgba(255,255,255,', 'rgba(168,216,255,',
        'rgba(0,200,255,',   'rgba(100,160,255,',
    ];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        stars = Array.from({ length: Math.floor(W * H / 3500) }, () => mkStar());
    }

    function mkStar() {
        const c = COLORS[Math.floor(Math.random() * COLORS.length)];
        const a = Math.random() * 0.55 + 0.2;
        return {
            x: Math.random() * W, y: Math.random() * H,
            r: Math.random() * 1.4 + 0.2,
            col: c,
            a, base: a,
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.018 + 0.004,
            vx: (Math.random() - 0.5) * 0.05,
            vy: (Math.random() - 0.5) * 0.025,
            spark: Math.random() < 0.07,
        };
    }

    function mkShoot() {
        const angle = Math.PI / 5 + (Math.random() - 0.5) * 0.4;
        const spd = 9 + Math.random() * 9;
        return {
            x: Math.random() * W,
            y: Math.random() * H * 0.5,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            len: 70 + Math.random() * 130,
            a: 1,
            fade: 0.022 + Math.random() * 0.018,
            col: Math.random() < 0.5 ? 'rgba(0,200,255,' : 'rgba(168,216,255,',
        };
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        // sky
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, '#020510');
        sky.addColorStop(1, '#030a1c');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        // vignette
        const vig = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
        vig.addColorStop(0, 'transparent');
        vig.addColorStop(1, 'rgba(2,5,16,0.65)');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, W, H);

        // stars
        for (const s of stars) {
            s.phase += s.speed;
            s.a = Math.max(0.05, Math.min(1, s.base + Math.sin(s.phase) * 0.22));
            s.x += s.vx; s.y += s.vy;
            if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
            if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
            ctx.save();
            ctx.globalAlpha = s.a;
            if (s.spark) {
                const sz = s.r * 1.8;
                ctx.strokeStyle = s.col + '1)';
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(s.x-sz,s.y); ctx.lineTo(s.x+sz,s.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(s.x,s.y-sz); ctx.lineTo(s.x,s.y+sz); ctx.stroke();
            } else {
                const g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2.2);
                g.addColorStop(0, s.col+'1)'); g.addColorStop(1, s.col+'0)');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r*2.2, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        // shooting stars
        if (frame % 200 === 0 && Math.random() < 0.55) shoots.push(mkShoot());
        shoots = shoots.filter(s => s.a > 0);
        for (const s of shoots) {
            const mag = Math.hypot(s.vx, s.vy);
            const g = ctx.createLinearGradient(s.x, s.y, s.x - s.vx/mag*s.len, s.y - s.vy/mag*s.len);
            g.addColorStop(0, s.col+'1)'); g.addColorStop(1, s.col+'0)');
            ctx.save();
            ctx.globalAlpha = s.a;
            ctx.strokeStyle = g;
            ctx.lineWidth = 1.2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.vx/mag*s.len, s.y - s.vy/mag*s.len);
            ctx.stroke();
            ctx.restore();
            s.x += s.vx; s.y += s.vy; s.a -= s.fade;
        }

        frame++;
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
})();

// ── Live check ──
async function checkLive() {
    try {
        const res = await fetch('https://decapi.me/twitch/uptime/emmystere5');
        const txt = await res.text();
        const on = !txt.toLowerCase().includes('offline') && txt.trim().length > 0;
        document.getElementById('liveBadge').classList.toggle('visible', on);
        document.getElementById('liveBanner').classList.toggle('visible', on);
    } catch(_) {}
}
checkLive();
setInterval(checkLive, 120_000);
</script>
