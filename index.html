<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmystere5 - Linktree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #020510;
            --cyan:    #00c8ff;
            --ice:     #a8d8ff;
            --surface: rgba(0, 80, 160, 0.07);
            --border:  rgba(0, 150, 255, 0.13);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: #dff0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* ── Starfield canvas ── */
        #starCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
        }

        /* Subtle radial vignette on top of canvas */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2,5,16,0.72) 100%);
            pointer-events: none;
        }

        /* ── Container ── */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.2rem;
        }

        /* ── Live banner ── */
        .live-banner {
            display: none;
            width: 100%;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.65rem 1.2rem;
            border-radius: 12px;
            background: rgba(233,25,22,0.1);
            border: 1px solid rgba(233,25,22,0.28);
            text-decoration: none;
            color: #ff9999;
            font-size: 0.84rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
            animation: fadeUp 0.6s ease both;
        }
        .live-banner:hover { background: rgba(233,25,22,0.18); border-color: rgba(233,25,22,0.5); }
        .live-banner.visible { display: flex; }

        .live-banner-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #e91916;
            animation: blink 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }

        /* ── Profile ── */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        .avatar-wrap {
            position: relative;
            width: 112px;
            height: 112px;
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #0033cc, #0099dd, #00e0ff, #00aaee, #0044ff, #0033cc);
            animation: spin 5s linear infinite;
            z-index: 0;
        }

        .avatar-ring-glow {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,200,255,0.2) 0%, transparent 70%);
            z-index: 0;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,100% { opacity: 0.6; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.08); }
        }

        .avatar-bg {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: var(--bg);
            z-index: 1;
        }

        .avatar {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            z-index: 3;
            background: #e91916;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 2px 7px;
            border-radius: 5px;
            border: 2px solid var(--bg);
            display: none;
            align-items: center;
            gap: 4px;
        }
        .live-badge.visible { display: flex; }

        .live-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #fff;
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.3; transform: scale(0.6); }
        }

        .profile-name {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 8vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
            background: linear-gradient(120deg, #fff 0%, var(--ice) 35%, var(--cyan) 65%, #0099ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s linear infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 18px rgba(0,200,255,0.4));
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        .profile-bio {
            font-size: 0.87rem;
            color: rgba(160,210,255,0.42);
            text-align: center;
            max-width: 270px;
            line-height: 1.55;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,180,255,0.2), transparent);
        }

        /* ── Links ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            color: #dff0ff;
            border: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                        border-color 0.25s ease,
                        box-shadow 0.25s ease;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .link-btn:hover  { transform: translateY(-4px) scale(1.01); }
        .link-btn:active { transform: translateY(-1px) scale(0.99); }

        .btn-twitch    { animation-delay: 0.15s; }
        .btn-discord   { animation-delay: 0.22s; }
        .btn-tiktok    { animation-delay: 0.29s; }
        .btn-instagram { animation-delay: 0.36s; }
        .btn-support   { animation-delay: 0.43s; }

        .btn-twitch::before    { background: linear-gradient(135deg,rgba(0,80,255,0.18),rgba(0,200,255,0.06)); }
        .btn-discord::before   { background: linear-gradient(135deg,rgba(20,60,210,0.2),rgba(0,140,255,0.06)); }
        .btn-tiktok::before    { background: linear-gradient(135deg,rgba(0,50,140,0.2),rgba(0,210,255,0.07)); }
        .btn-instagram::before { background: linear-gradient(135deg,rgba(0,50,170,0.2),rgba(0,180,255,0.07)); }
        .btn-support::before   { background: linear-gradient(135deg,rgba(0,90,200,0.2),rgba(140,220,255,0.05)); }

        .btn-twitch:hover    { border-color: var(--cyan); box-shadow: 0 0 28px rgba(0,200,255,0.3), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-discord:hover   { border-color: #5fa8ff;     box-shadow: 0 0 28px rgba(60,130,255,0.3), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-tiktok:hover    { border-color: #00d4ff;     box-shadow: 0 0 28px rgba(0,200,255,0.25), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-instagram:hover { border-color: #88ccff;     box-shadow: 0 0 28px rgba(100,180,255,0.25), 0 8px 30px rgba(0,0,0,0.5); }
        .btn-support:hover   { border-color: var(--ice);  box-shadow: 0 0 28px rgba(168,216,255,0.22), 0 8px 30px rgba(0,0,0,0.5); }

        .link-btn:hover::before { opacity: 1; }

        .btn-icon  { width:20px; height:20px; flex-shrink:0; position:relative; z-index:1; opacity:0.65; }
        .btn-label { flex:1; text-align:center; position:relative; z-index:1; }
        .btn-arrow {
            position:relative; z-index:1;
            opacity:0; transform:translateX(-6px);
            transition: opacity 0.2s, transform 0.2s;
            color:rgba(140,200,255,0.55);
        }
        .link-btn:hover .btn-arrow { opacity:1; transform:translateX(0); }

        /* ── Footer ── */
        .footer {
            font-size: 0.72rem;
            color: rgba(100,160,220,0.28);
            letter-spacing: 0.05em;
            animation: fadeUp 0.8s ease 0.52s both;
        }

        @keyframes spin    { to { transform: rotate(360deg); } }
        @keyframes fadeUp  {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>

    <script>
    // ══════════════════════════════════════════
    //   STARFIELD ANIMATION
    // ══════════════════════════════════════════
    (function () {
        const canvas = document.getElementById('starCanvas');
        const ctx    = canvas.getContext('2d');

        let W, H, stars = [], nebulae = [], shootingStars = [];

        // Star colours — blue night / glacial cyan palette
        const STAR_COLORS = [
            'rgba(255,255,255,',    // pure white
            'rgba(168,216,255,',    // ice blue
            'rgba(0,200,255,',      // cyan
            'rgba(100,160,255,',    // soft blue
            'rgba(60,100,200,',     // deep blue
        ];

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initStars();
            initNebulae();
        }

        // ── Stars ──
        function initStars() {
            const count = Math.floor((W * H) / 3200);
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push(createStar());
            }
        }

        function createStar(x, y) {
            const size  = Math.random() * 1.8 + 0.2;
            const color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
            return {
                x:     x ?? Math.random() * W,
                y:     y ?? Math.random() * H,
                size,
                baseSize: size,
                color,
                alpha:   Math.random() * 0.6 + 0.3,
                baseAlpha: Math.random() * 0.6 + 0.3,
                // Twinkling
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinklePhase: Math.random() * Math.PI * 2,
                // Slow drift
                vx: (Math.random() - 0.5) * 0.06,
                vy: (Math.random() - 0.5) * 0.03,
                // Some stars are larger "sparkles"
                sparkle: Math.random() < 0.08,
            };
        }

        // ── Nebula blobs (atmospheric depth) ──
        function initNebulae() {
            nebulae = [];
            const blobs = [
                { cx: W * 0.15, cy: H * 0.2,  r: W * 0.35, color: 'rgba(0,40,140,' },
                { cx: W * 0.85, cy: H * 0.75, r: W * 0.3,  color: 'rgba(0,80,180,' },
                { cx: W * 0.5,  cy: H * 0.5,  r: W * 0.2,  color: 'rgba(0,30,100,' },
                { cx: W * 0.7,  cy: H * 0.15, r: W * 0.22, color: 'rgba(0,60,160,' },
            ];
            blobs.forEach(b => {
                const g = ctx.createRadialGradient(b.cx, b.cy, 0, b.cx, b.cy, b.r);
                g.addColorStop(0,   b.color + '0.12)');
                g.addColorStop(0.5, b.color + '0.05)');
                g.addColorStop(1,   b.color + '0)');
                nebulae.push({ ...b, gradient: g });
            });
        }

        // ── Shooting stars ──
        function spawnShootingStar() {
            const angle  = Math.PI / 5 + Math.random() * 0.3; // diagonal
            const speed  = 8 + Math.random() * 10;
            const length = 80 + Math.random() * 160;
            return {
                x:     Math.random() * W,
                y:     Math.random() * H * 0.5,
                vx:    Math.cos(angle) * speed,
                vy:    Math.sin(angle) * speed,
                length,
                alpha: 1,
                fade:  0.025 + Math.random() * 0.02,
                color: Math.random() < 0.5 ? 'rgba(0,200,255,' : 'rgba(168,216,255,',
            };
        }

        // ── Draw ──
        let frame = 0;

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Sky gradient
            const sky = ctx.createLinearGradient(0, 0, 0, H);
            sky.addColorStop(0, '#020510');
            sky.addColorStop(0.5, '#030818');
            sky.addColorStop(1, '#040a1e');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H);

            // Nebulae
            nebulae.forEach(n => {
                ctx.fillStyle = n.gradient;
                ctx.beginPath();
                ctx.arc(n.cx, n.cy, n.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Stars
            stars.forEach(s => {
                // Twinkle
                s.twinklePhase += s.twinkleSpeed;
                s.alpha = s.baseAlpha + Math.sin(s.twinklePhase) * 0.25;
                s.alpha = Math.max(0.05, Math.min(1, s.alpha));

                // Drift
                s.x += s.vx;
                s.y += s.vy;
                if (s.x < 0) s.x = W;
                if (s.x > W) s.x = 0;
                if (s.y < 0) s.y = H;
                if (s.y > H) s.y = 0;

                ctx.save();
                ctx.globalAlpha = s.alpha;

                if (s.sparkle) {
                    // Cross / sparkle shape
                    const sz = s.baseSize * 1.6;
                    ctx.strokeStyle = s.color + '1)';
                    ctx.lineWidth   = 0.6;
                    ctx.beginPath();
                    ctx.moveTo(s.x - sz, s.y);
                    ctx.lineTo(s.x + sz, s.y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y - sz);
                    ctx.lineTo(s.x, s.y + sz);
                    ctx.stroke();
                    // Glow
                    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz * 2.5);
                    g.addColorStop(0, s.color + '0.5)');
                    g.addColorStop(1, s.color + '0)');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, sz * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Normal circle star
                    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.baseSize * 2);
                    g.addColorStop(0, s.color + '1)');
                    g.addColorStop(1, s.color + '0)');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.baseSize * 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });

            // Shooting stars
            if (frame % 180 === 0 && Math.random() < 0.6) {
                shootingStars.push(spawnShootingStar());
            }

            shootingStars = shootingStars.filter(ss => ss.alpha > 0);
            shootingStars.forEach(ss => {
                ctx.save();
                ctx.globalAlpha = ss.alpha;

                const grad = ctx.createLinearGradient(
                    ss.x, ss.y,
                    ss.x - ss.vx / Math.hypot(ss.vx, ss.vy) * ss.length,
                    ss.y - ss.vy / Math.hypot(ss.vx, ss.vy) * ss.length
                );
                grad.addColorStop(0, ss.color + '1)');
                grad.addColorStop(1, ss.color + '0)');

                ctx.strokeStyle = grad;
                ctx.lineWidth   = 1.5;
                ctx.lineCap     = 'round';
                ctx.beginPath();
                ctx.moveTo(ss.x, ss.y);
                ctx.lineTo(
                    ss.x - ss.vx / Math.hypot(ss.vx, ss.vy) * ss.length,
                    ss.y - ss.vy / Math.hypot(ss.vx, ss.vy) * ss.length
                );
                ctx.stroke();
                ctx.restore();

                ss.x     += ss.vx;
                ss.y     += ss.vy;
                ss.alpha -= ss.fade;
            });

            frame++;
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    })();

    // ══════════════════════════════════════════
    //   TWITCH LIVE DETECTION
    // ══════════════════════════════════════════
    const CHANNEL = 'emmystere5';

    async function checkLive() {
        try {
            const res  = await fetch(`https://decapi.me/twitch/uptime/${CHANNEL}`);
            const text = await res.text();
            const isLive = !text.toLowerCase().includes('offline') && text.trim().length > 0;
            document.getElementById('liveBadge').classList.toggle('visible', isLive);
            document.getElementById('liveBanner').classList.toggle('visible', isLive);
        } catch (_) {}
    }

    checkLive();
    setInterval(checkLive, 120_000);
    </script>
